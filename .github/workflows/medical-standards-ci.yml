name: Medical Standards CI

on:
  push:
    paths:
      - 'docs/medical-standards/**'
  workflow_dispatch:

jobs:
  convert:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install PyYAML

      - name: Convert Markdown to JSON
        run: python scripts/convert_medical_standards.py

      - name: Commit and push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add medical-standards/*.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "[bot] Update medical standards JSON endpoints" && git push)
