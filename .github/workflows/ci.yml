name: OrionHealth CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Flutter Analyze
        run: |
          flutter analyze --no-fatal-infos --no-fatal-warnings
          echo "--- Analyzing packages ---"
          for pkg in packages/health_wallet packages/medical_standards; do
            echo "Analyzing $pkg..."
            cd $pkg && flutter pub get && flutter analyze --no-fatal-infos --no-fatal-warnings && cd ../..
          done

      - name: Flutter Test (root)
        run: flutter test --reporter expanded | tee test_output.txt

      - name: Flutter Test (packages)
        run: |
          for pkg in packages/health_wallet packages/medical_standards; do
            echo "Testing $pkg..."
            cd $pkg && flutter test --reporter expanded && cd ../..
          done || echo "Packages test warnings (non-fatal)"

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test_output.txt
