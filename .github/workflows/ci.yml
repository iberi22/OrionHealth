name: OrionHealth CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FLUTTER_VERSION: '3.41.9'
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Detectar branches generados por agentes (ID numérico largo al final)
  check-branch:
    runs-on: ubuntu-latest
    outputs:
      is-agent-branch: ${{ steps.check.outputs.is-agent }}
    steps:
      - id: check
        run: |
          HEAD_REF="${{ github.head_ref || github.ref_name }}"
          # Patrón: branch termina con ID numérico de 15+ dígitos
          # Ejemplos: port-openmed-1163069574422808376, feat-medical-15481651653073492371
          if echo "$HEAD_REF" | grep -qE '\-[0-9]{15,}$'; then
            echo "is-agent=true" >> $GITHUB_OUTPUT
            echo "⚡ Branch '$HEAD_REF' parece generado por agente - CI pesado saltado"
          else
            echo "is-agent=false" >> $GITHUB_OUTPUT
            echo "✅ Branch '$HEAD_REF' normal - ejecutando CI completo"
          fi

  analyze:
    name: Dart Analyze
    runs-on: ubuntu-latest
    needs: check-branch
    if: needs.check-branch.outputs.is-agent-branch != 'true'
    steps:
      - uses: actions/checkout@v6
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: ${{ env.FLUTTER_VERSION }}
      - run: flutter pub get
      - run: flutter analyze --no-fatal-infos --no-fatal-warnings
        continue-on-error: false

  test:
    name: Flutter Test
    runs-on: ubuntu-latest
    needs: [check-branch, analyze]
    if: needs.check-branch.outputs.is-agent-branch != 'true'
    steps:
      - uses: actions/checkout@v6
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: ${{ env.FLUTTER_VERSION }}
      - run: flutter pub get
      - name: Run tests
        run: flutter test test/features/ --concurrency=1 --reporter expanded
        continue-on-error: false

  build-windows:
    name: Build Windows
    runs-on: windows-latest
    needs: [check-branch, analyze]
    if: needs.check-branch.outputs.is-agent-branch != 'true'
    steps:
      - uses: actions/checkout@v6
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: ${{ env.FLUTTER_VERSION }}
      - run: flutter config --enable-windows-desktop
      - run: flutter pub get
      - run: flutter build windows --debug
      - uses: actions/upload-artifact@v4
        with:
          name: orionhealth-windows-debug
          path: build/windows/x64/runner/Debug/
          retention-days: 7

  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    needs: [check-branch, analyze]
    if: needs.check-branch.outputs.is-agent-branch != 'true'
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: ${{ env.FLUTTER_VERSION }}
      - run: flutter pub get
      - run: flutter build apk --debug
      - uses: actions/upload-artifact@v4
        with:
          name: orionhealth-android-debug
          path: build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 7
