name: Release APK

on:
  push:
    tags:
      - 'v*'

env:
  FLUTTER_VERSION: '3.41.9'
  JAVA_VERSION: '17'

jobs:
  analyze_and_test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true
          cache-dependency-path: .flutter-plugins

      - name: Get dependencies
        run: flutter pub get

      - name: Run build_runner
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Run flutter analyze
        run: flutter analyze --no-fatal-infos --no-fatal-warnings

      - name: Run tests
        run: flutter test --reporter compact

  build:
    needs: analyze_and_test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: ${{ env.JAVA_VERSION }}

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true
          cache-dependency-path: .flutter-plugins

      - name: Get dependencies
        run: flutter pub get

      - name: Run build_runner
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build debug APK
        run: flutter build apk --debug

      - name: Build release AAB
        run: flutter build appbundle --release

      - name: Calculate SHA256 for release APK
        run: |
          sha256sum build/app/outputs/flutter-apk/app-release.apk > build/app/outputs/flutter-apk/app-release.apk.sha256

      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: orionhealth-apks
          path: |
            build/app/outputs/flutter-apk/app-debug.apk
            build/app/outputs/flutter-apk/app-release.apk
            build/app/outputs/flutter-apk/app-release.apk.sha256
          retention-days: 30

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: orionhealth-aab
          path: build/app/outputs/bundle/release/app-release.aab
          retention-days: 30

  release:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')

    steps:
      - uses: actions/checkout@v4

      - name: Download APK artifacts
        uses: actions/download-artifact@v4
        with:
          name: orionhealth-apks
          path: artifacts/apk

      - name: Download AAB artifact
        uses: actions/download-artifact@v4
        with:
          name: orionhealth-aab
          path: artifacts/aab

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/apk/app-release.apk
            artifacts/apk/app-release.apk.sha256
            artifacts/aab/app-release.aab
          generate_release_notes: true
          draft: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
