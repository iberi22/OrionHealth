name: Deploy Astro Site to GitHub Pages

on:
  push:
    branches: [ main, git-core-v2 ]
    paths:
      - 'docs/**'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

env:
  NODE_VERSION: '22'
  GIT_CORE_VERSION: '2'

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  validate-git-core:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate Git-Core Protocol
        run: |
          if [ -f ".gitcore/version" ]; then
            echo "Git-Core Protocol v$(cat .gitcore/version) detected"
          else
            echo "Warning: .gitcore/version not found"
            exit 1
          fi

  build:
    needs: validate-git-core
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./docs
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: |
          rm -rf node_modules package-lock.json
          npm install --legacy-peer-deps

      - name: Build site
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./docs/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
