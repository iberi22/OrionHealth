name: Bug Report
description: Report a bug to help us improve OrionHealth
title: "[Bug] "
labels: ["bug", "needs-triage"]
assignees: []
body:
  - type: markdown
    attributes:
      value: |
        ## 🐛 Bug Report

        Thanks for taking the time to report this bug. Please fill out the information below to help us reproduce and fix the issue.

  - type: textarea
    id: description
    attributes:
      label: Bug Description
      placeholder: A clear and concise description of what the bug is.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      placeholder: What you expected to happen.
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      placeholder: What actually happens instead.
    validations:
      required: true

  - type: dropdown
    id: severity
    attributes:
      label: Severity
      options:
        - Low
        - Medium
        - High
        - Critical
    validations:
      required: true

  - type: input
    id: device
    attributes:
      label: Device / Emulator
      placeholder: e.g., Samsung Galaxy S23, Android Emulator API 34

  - type: input
    id: app-version
    attributes:
      label: App Version
      placeholder: e.g., 1.0.0

  - type: input
    id: flutter-version
    attributes:
      label: Flutter Version
      placeholder: e.g., 3.24.0

  - type: textarea
    id: logs
    attributes:
      label: Relevant Log Output
      placeholder: Paste any relevant log output here.

  - type: checkboxes
    id: issues
    attributes:
      label: Related Issues
      options:
        - label: This bug blocks a feature
          value: blocks-feature
        - label: This bug is security-related
          value: security
        - label: This bug is a crash
          value: crash