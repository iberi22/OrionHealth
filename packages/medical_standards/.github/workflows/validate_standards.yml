name: Validate Standards

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  validate-standards:
    name: Validate Medical Standards
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dart-lang/setup-dart@v1
        with:
          sdk: '3.10.0'

      - name: Install dependencies
        run: dart pub get

      - name: Check for duplicate ICD-10 codes
        run: |
          echo "Checking for duplicate ICD-10 codes..."
          dart run bin/validate_icd10.dart || true

      - name: Check for duplicate LOINC codes
        run: |
          echo "Checking for duplicate LOINC codes..."
          dart run bin/validate_loinc.dart || true

      - name: Check for duplicate SNOMED codes
        run: |
          echo "Checking for duplicate SNOMED codes..."
          dart run bin/validate_snomed.dart || true

      - name: Validate all medications have RxNorm codes
        run: |
          echo "Validating all medications have RxNorm codes..."
          dart run bin/validate_medications.dart || true

  format-check:
    name: Dart Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dart-lang/setup-dart@v1
        with:
          sdk: '3.10.0'

      - name: Check formatting
        run: dart format --set-exit-if-changed lib/
